<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | NFT preview card component</title>

  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <section>
      <article class="nft-preview-card">
        <header>
          <figure>
            <a href="" target="_blank" rel="noopener noreferrer">
              <img class="main-image" src="images/image-equilibrium.jpg" alt="a transparent cube balancing on one of its vertices">
              <div class="overlay">
                    <img class="icon-view" src="./images/icon-view.svg">
              </div>
            </a>
          </figure>
          <h1><a href="" target="_blank" rel="noopener noreferrer">Equilibrium #3429</a></h1>
        </header>
        <div class="nft-preview-card-body">
          <p>Our Equilibrium collection promotes balance and calm.</p>
          <div class="offer-details-container">
            <div class="pricing-info-container">
              <img src="images/icon-ethereum.svg" alt="ethereum icon">
              <span>0.041 ETH</span>
            </div>
            <div class="deadline-container">
              <img src="images/icon-clock.svg" alt="clock icon">
              <span>3 days left</span>
            </div>
          </div>
        </div>
        <footer class="nft-preview-card-footer">
          <img src="images/image-avatar.png" alt="avatar of the creator">
          <p>Creation of <a href="" target="_blank" rel="noopener noreferrer">Jules Wyvern</a></p>
        </footer>
      </article>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" rel="noopener noreferrer">Frontend Mentor</a>. 
    Coded by <a href="#">Mellow</a>.
  </footer>
</body>
</html>
